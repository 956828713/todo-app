<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      color: #1a1a2e;
      margin-bottom: 24px;
      font-weight: 700;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .input-row input:focus {
      border-color: #6c63ff;
    }

    .input-row button {
      padding: 12px 20px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a52d5;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      color: #555;
      font-weight: 500;
      transition: all 0.2s;
    }

    .filters button.active {
      border-color: #6c63ff;
      color: #6c63ff;
      background: #f3f2ff;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      padding: 14px 16px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: opacity 0.2s;
    }

    .todo-item.done {
      opacity: 0.55;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item .text {
      flex: 1;
      font-size: 15px;
      color: #333;
      word-break: break-all;
    }

    .todo-item.done .text {
      text-decoration: line-through;
      color: #999;
    }

    .todo-item .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 18px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .todo-item .delete-btn:hover {
      color: #ff5c5c;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #999;
      padding: 0 4px;
    }

    .footer button {
      background: none;
      border: none;
      color: #ff5c5c;
      cursor: pointer;
      font-size: 13px;
    }

    .footer button:hover {
      text-decoration: underline;
    }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 32px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>待办事项</h1>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="输入待办事项..." maxlength="100">
      <button onclick="addTodo()">添加</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">全部</button>
      <button onclick="setFilter('active', this)">未完成</button>
      <button onclick="setFilter('done', this)">已完成</button>
    </div>

    <div class="todo-list" id="todoList"></div>

    <div class="footer">
      <span id="countText"></span>
      <button onclick="clearDone()">清除已完成</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">暂无待办事项</div>';
      } else {
        list.innerHTML = filtered.map(t => `
          <div class="todo-item ${t.done ? 'done' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
            <span class="text">${escapeHtml(t.text)}</span>
            <button class="delete-btn" onclick="remove(${t.id})">&#x2715;</button>
          </div>
        `).join('');
      }

      const active = todos.filter(t => !t.done).length;
      document.getElementById('countText').textContent = `${active} 项未完成`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }

    function remove(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
