<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* 浅色主题默认值 */
      --bg-color: #f0f2f5;
      --container-bg: #fff;
      --text-color: #333;
      --title-color: #1a1a2e;
      --border-color: #e0e0e0;
      --primary-color: #6c63ff;
      --primary-hover: #5a52d5;
      --secondary-bg: #f3f2ff;
      --muted-color: #999;
      --danger-color: #ff5c5c;
      --danger-hover: #e04a4a;
      --checkbox-color: #6c63ff;
      --shadow-color: rgba(0,0,0,0.06);
      --empty-color: #bbb;
      --delete-btn-color: #ccc;

    }

    [data-theme="dark"] {
      /* 深色主题 */
      --bg-color: #1a1a2e;
      --container-bg: #2d2d44;
      --text-color: #e0e0e0;
      --title-color: #ffffff;
      --border-color: #444;
      --primary-color: #8a84ff;
      --primary-hover: #7a74e6;
      --secondary-bg: #3a3a5a;
      --muted-color: #aaa;
      --danger-color: #ff7a7a;
      --danger-hover: #e66a6a;
      --checkbox-color: #8a84ff;
      --delete-btn-color: #aaa;
      --empty-color: #ccc;
      --shadow-color: rgba(0,0,0,0.2);

    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-color);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .container {
      width: 100%;
      max-width: 520px;
      transition: background-color 0.3s ease;
    }

    h1 {
      text-align: center;
      font-size: 28px;
      color: var(--title-color);
      font-weight: 700;
      flex-grow: 1;
      margin: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid var(--border-color);
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      background: var(--container-bg);
    }

    .input-row input:focus {
      border-color: var(--primary-color);
    }

    .input-row button {
      padding: 12px 20px;
      background: var(--primary-color);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: var(--primary-hover);
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      background: var(--container-bg);
      font-size: 13px;
      cursor: pointer;
      color: var(--text-color);
      font-weight: 500;
      transition: all 0.2s;
    }

    .filters button.active {
      border-color: var(--primary-color);
      color: var(--primary-color);
      background: var(--secondary-bg);
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--container-bg);
      padding: 14px 16px;
      border-radius: 10px;
      box-shadow: 0 1px 4px var(--shadow-color);
      transition: opacity 0.2s, background-color 0.3s ease, box-shadow 0.3s ease;
    }

    .todo-item.done {
      opacity: 0.55;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--checkbox-color);
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item .text {
      flex: 1;
      font-size: 15px;
      color: var(--text-color);
      word-break: break-all;
    }

    .todo-item.done .text {
      text-decoration: line-through;
      color: var(--muted-color);
    }

    .todo-item .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--delete-btn-color);
      font-size: 18px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .todo-item .delete-btn:hover {
      color: var(--danger-color);
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--muted-color);
      padding: 0 4px;
    }

    .footer button {
      background: none;
      border: none;
      color: var(--danger-color);
      cursor: pointer;
      font-size: 13px;
    }

    .footer button:hover {
      text-decoration: underline;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .lang-toggle {
      background: transparent;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--text-color);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .lang-toggle:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
      background: var(--secondary-bg);
    }

    .header-controls {
      display: flex;
      gap: 8px;
    }

    .theme-toggle {
      background: transparent;
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--text-color);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .theme-toggle:hover {
      border-color: var(--primary-color);
      color: var(--primary-color);
      background: var(--secondary-bg);
    }







    .empty {
      text-align: center;
      color: var(--empty-color);
      font-size: 14px;
      padding: 32px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>待办事项</h1>
      <div class="header-controls">
        <button class="theme-toggle" onclick="toggleTheme()">🌙 深色模式</button>
        <button class="lang-toggle" onclick="toggleLanguage()">🌐 English</button>
      </div>
    </div>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="输入待办事项..." maxlength="100">
      <button onclick="addTodo()">添加</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">全部</button>
      <button onclick="setFilter('active', this)">未完成</button>
      <button onclick="setFilter('done', this)">已完成</button>
    </div>

    <div class="todo-list" id="todoList"></div>

    <div class="footer">
      <span id="countText"></span>
      <button onclick="clearDone()">清除已完成</button>
    </div>
  </div>

  <script>
    // 语言设置
    let lang = localStorage.getItem('lang') || 'zh';
    // 主题设置
    let theme = localStorage.getItem('theme') || 'dark';
    const translations = {
      zh: {
        title: '待办事项',
        placeholder: '输入待办事项...',
        add: '添加',
        all: '全部',
        active: '未完成',
        done: '已完成',
        empty: '暂无待办事项',
        count: count => `${count} 项未完成`,
        clear: '清除已完成',
        toggleBtn: '🌐 English',
        darkBtn: '🌙 深色模式',
        lightBtn: '☀️ 浅色模式'
      },
      en: {
        title: 'Todo App',
        placeholder: 'Add a todo...',
        add: 'Add',
        all: 'All',
        active: 'Active',
        done: 'Completed',
        empty: 'No todos yet',
        count: count => `${count} item${count === 1 ? '' : 's'} left`,
        clear: 'Clear completed',
        toggleBtn: '🌐 中文',
        darkBtn: '🌙 Dark mode',
        lightBtn: '☀️ Light mode'
      }
    };

    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    // 切换语言
    function toggleLanguage() {
      lang = lang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('lang', lang);
      updateLanguage();
    }

    // 切换主题
    function toggleTheme() {
      theme = theme === 'light' ? 'dark' : 'light';
      localStorage.setItem('theme', theme);
      updateTheme();
    }

    // 应用主题
    function updateTheme() {
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeButton();
    }

    // 更新主题切换按钮文本（根据当前主题和语言）
    function updateThemeButton() {
      const themeBtn = document.querySelector('.theme-toggle');
      if (themeBtn) {
        const t = translations[lang];
        themeBtn.textContent = theme === 'light' ? t.darkBtn : t.lightBtn;
      }
    }

    // 获取当前选择的优先级



    // 更新界面语言
    function updateLanguage() {
      const t = translations[lang];

      // 更新标题
      document.querySelector('h1').textContent = t.title;

      // 更新输入框placeholder
      document.getElementById('todoInput').placeholder = t.placeholder;

      // 更新添加按钮
      document.querySelector('.input-row button').textContent = t.add;

      // 更新过滤器按钮
      const filterButtons = document.querySelectorAll('.filters button');
      filterButtons[0].textContent = t.all;
      filterButtons[1].textContent = t.active;
      filterButtons[2].textContent = t.done;

      // 更新清除按钮
      document.querySelector('.footer button').textContent = t.clear;

      // 更新语言切换按钮
      document.querySelector('.lang-toggle').textContent = t.toggleBtn;

      // 更新主题切换按钮文本
      updateThemeButton();


      // 更新html lang属性
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';

      // 重新渲染以更新计数和空状态
      render();
    }

    function render() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty">${translations[lang].empty}</div>`;
      } else {
        list.innerHTML = filtered.map(t => `
          <div class="todo-item ${t.done ? 'done' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
            <span class="text">${escapeHtml(t.text)}</span>
            <button class="delete-btn" onclick="remove(${t.id})">&#x2715;</button>
          </div>
        `).join('');
      }

      const active = todos.filter(t => !t.done).length;
      document.getElementById('countText').textContent = translations[lang].count(active);
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;

      todos.unshift({
        id: Date.now(),
        text,
        done: false
      });
      input.value = '';
      save();
      render();
    }


    function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }

    function remove(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });


    // 初始化主题
    updateTheme();

    // 初始化语言
    updateLanguage();
    render();
  </script>
<!-- 测试日志记录 -->
</body>
</html>
